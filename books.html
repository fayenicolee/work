<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Picture Books</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="portfolio">
      <header class="hero">
        <h1>Picture Books</h1>
        <p>by Grade 6</p>
      </header>

      <section class="book-grid" id="bookGrid" aria-label="Picture books"></section>
    </main>

    <div class="modal" id="bookModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-shell">
        <button class="icon-btn close" id="closeModal" type="button" aria-label="Close reader">Close</button>

        <div class="modal-topbar">
          <button class="icon-btn" id="prevBook" type="button" aria-label="Open previous book">Previous</button>
          <h2 id="modalTitle">Book title</h2>
          <button class="icon-btn" id="nextBook" type="button" aria-label="Open next book">Next</button>
        </div>

        <div class="reader-wrap">
          <iframe id="bookFrame" title="Picture book reader" loading="lazy"></iframe>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
