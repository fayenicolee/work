<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <h1>Snake</h1>
      <section class="hud" aria-label="Game status">
        <p>Score: <span id="score">0</span></p>
        <p>High: <span id="highScore">0</span></p>
      </section>

      <section class="controls-row" aria-label="Game actions">
        <button id="startBtn" type="button">Start / Restart</button>
        <button id="pauseBtn" type="button">Pause</button>
      </section>

      <p id="status" role="status" aria-live="polite">Press Start to play.</p>

      <section class="board-wrap">
        <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>
      </section>

      <section class="touch-controls" aria-label="Direction controls">
        <button data-dir="up" type="button">Up</button>
        <div class="touch-middle">
          <button data-dir="left" type="button">Left</button>
          <button data-dir="down" type="button">Down</button>
          <button data-dir="right" type="button">Right</button>
        </div>
      </section>

      <p class="help">Controls: Arrow keys or WASD. Space toggles pause.</p>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
