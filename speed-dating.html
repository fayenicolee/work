<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Character Speed Dating</title>
    <link rel="stylesheet" href="./speed-dating.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-card">
        <h1>Book Character Speed Dating</h1>
      </section>

      <section class="question-stage">
        <div class="center-stage">
          <p class="question-tag">Tonight's prompt</p>

          <button id="questionButton" class="giant-heart" type="button" aria-describedby="questionText">
            <span class="heart-face">♥</span>
            <span id="questionText" class="question-overlay">Tap the heart to reveal a book question.</span>
            <span class="heart-label">New Question</span>
          </button>

          <button id="timerButton" class="timer-card" type="button" aria-live="polite">
            <span class="timer-label">Tap to start round</span>
            <span id="timerText" class="timer-text">02:00</span>
          </button>
        </div>
      </section>
    </main>

    <script src="./speed-dating.js"></script>
  </body>
</html>
